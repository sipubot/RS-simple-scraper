
[package]
name = "textminer"
version = "1.2.0"
authors = ["SIPU <ddasik00@naver.com>"]
edition = "2024"

[profile.release]
opt-level = 'z'
lto=true
codegen-units=1

[dependencies]
tokio = { version = "1.52.1", features = ["full"] }
chrono =  { version = "0.4.44", default-features = false, features = ["clock", "std"] } 
chrono-tz = "0.10.4"
async-trait = "0.1.89"
serde = { version = "1.0.228", features = ["derive"] }
flexi_logger = { version = "0.31", features = ["async"] }
log = "0.4"
serde_json = "1.0.149"
reqwest = { version = "0.13.2", features = ["blocking", "socks", "json"] }
scraper = "0.26.0"
anyhow = "1.0.102"
bytes = "1.11.1"
regex = "1.12.3"
url ="2.5.8"
thirtyfour = "0.36.1"
lazy_static = "1.5"
futures = "0.3.32"
